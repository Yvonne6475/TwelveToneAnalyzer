name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_type:
        description: 'What to build'
        required: true
        type: choice
        default: 'windows-zip-only'
        options:
          - full
          - windows-zip-only

jobs:
  # ── macOS .app + .dmg ──────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'full'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_mac.txt

      - name: Extract version
        id: ver
        run: |
          V=$(python -c "from src.core.updater import VERSION; print(VERSION)")
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Build .app
        run: pyinstaller TwelveToneAnalyzer_mac.spec

      - name: Package DMG
        run: |
          cp -R dist/TwelveToneAnalyzer.app dist/dmg_staging/
          ln -s /Applications dist/dmg_staging/Applications
          hdiutil create \
            -volname "TwelveToneAnalyzer" \
            -srcfolder dist/dmg_staging \
            -ov -format UDZO \
            "dist/TwelveToneAnalyzer_Setup_v${{ steps.ver.outputs.version }}.dmg"
          rm -rf dist/dmg_staging

      - uses: actions/upload-artifact@v4
        with:
          name: macOS-DMG
          path: dist/TwelveToneAnalyzer_Setup_v*.dmg
          retention-days: 7

  # ── Windows .exe + NSIS installer + portable ZIP ────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==5.13.2
          pip install -r requirements.txt

      - name: Extract version
        id: ver
        shell: bash
        run: |
          V=$(python -c "from src.core.updater import VERSION; print(VERSION)")
          echo "version=$V" >> $GITHUB_OUTPUT

      - name: Build .exe
        run: pyinstaller TwelveToneAnalyzer.spec

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $src = "dist/TwelveToneAnalyzer"
          $dst = "dist/TwelveToneAnalyzer_Portable_v${ver}.zip"
          Compress-Archive -Path "$src/*" -DestinationPath $dst

      - uses: actions/upload-artifact@v4
        with:
          name: Windows-Portable-ZIP
          path: dist/TwelveToneAnalyzer_Portable_v*.zip
          retention-days: 7

      # NSIS installer — only for full builds
      - name: Install NSIS
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'full'
        shell: bash
        run: choco install nsis -y 2>&1 | tail -3

      - name: Build NSIS installer
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'full'
        shell: pwsh
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsis)) { $nsis = "C:\Program Files\NSIS\makensis.exe" }
          & $nsis /DVERSION="${{ steps.ver.outputs.version }}" installer.nsi
          Move-Item -Force TwelveToneAnalyzer_Setup_v*.exe dist/

      - uses: actions/upload-artifact@v4
        if: github.event_name != 'workflow_dispatch' || inputs.build_type == 'full'
        with:
          name: Windows-EXE
          path: dist/TwelveToneAnalyzer_Setup_v*.exe
          retention-days: 7

  # ── GitHub Release (only on tag) ───────────────────────────────
  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macOS-DMG
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: Windows-EXE
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: Windows-Portable-ZIP
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Manual: upload portable ZIP to existing release ────────────
  release-zip-only:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.build_type == 'windows-zip-only'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Windows-Portable-ZIP
          path: artifacts/

      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          tag_name: v1.3.3.2
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
